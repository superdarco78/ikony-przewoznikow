name: Pobierz ikony przewoznikow

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

permissions:
  contents: write

jobs:
  ikony:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalacja Pillow i Tor
        run: |
          pip install Pillow --quiet
          sudo apt-get install -y tor --quiet
          sudo service tor start
          sleep 3

      - name: Pobierz i konwertuj ikony
        run: python3 pobierz_ikony.py

      - name: Zapisz do repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ikony/
          git diff --cached --quiet \
            && echo "Brak zmian." \
            || (git commit -m "ikony: aktualizacja $(date +%Y-%m-%d)" && git push)
